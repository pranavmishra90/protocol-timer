[project]
name = "protocol-timer"
version = "0.4"
readme = "readme.md"
authors = [
    { name = "Pranav Kumar Mishra", email = "62562712+pranavmishra90@users.noreply.github.com" }
]
requires-python = ">=3.13,<3.14"
dependencies = [
    "jupyter>=1.1.1",
    "jupyter-cache>=1.0.1",
    "markdown>=3.10.2",
    "nbformat>=5.10.4",
    "nbstripout>=0.9.1",
    "numpy>=2.4.2",
    "pandas>=3.0.1",
    "tqdm>=4.67.3",
]


[tool.semantic_release]
assets = []
build_command_env = []
commit_message = "ci: {version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = true
allow_zero_version = true
no_git_verify = false
tag_format = "v{version}"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false

[tool.semantic_release.branches.develop]
match = "develop"
prerelease_token = "beta"
prerelease = true

[tool.semantic_release.changelog]
template_dir = "templates"
changelog_file = "changelog.md"
exclude_commit_patterns = []

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "Pranav Kumar Mishra <62562712+pranavmishra90@users.noreply.github.com>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
default_bump_level = 0

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = true
insecure = false

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true
